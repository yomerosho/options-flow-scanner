name: Options Flow Auto-Scanner

on:
  # ── Pre-market: every 5 min, 3:30–8:30 AM CST (09:30–14:30 UTC) Mon–Fri ────
  schedule:
    - cron: '30,35,40,45,50,55 9 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 10,11,12,13 * * 1-5'
    - cron: '0,5,10,15,20,25,30 14 * * 1-5'

    # ── Market hours: every 15 min, 8:30 AM–2:00 PM CST (14:30–20:00 UTC) ────
    - cron: '45 14 * * 1-5'
    - cron: '0,15,30,45 15,16,17,18,19 * * 1-5'
    - cron: '0 20 * * 1-5'

    # ── After-hours: every 10 min, 2:00–6:00 PM CST (20:00–00:00 UTC) ─────────
    - cron: '10,20,30,40,50 20,21,22,23 * * 1-5'
    - cron: '0,10,20,30,40,50 0 * * 2-6'

  workflow_dispatch:  # Manual trigger from GitHub UI anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Use Node.js 24

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          GMAIL_USER:    ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:    ${{ secrets.GMAIL_PASS }}
          GMAIL_TO:      ${{ secrets.GMAIL_TO }}
        run: python3 github_scanner.py

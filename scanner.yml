name: Options Flow Scanner

on:
  schedule:
    # ── Market hours: every 30 min, 8:30 AM–3:00 PM CST (14:30–21:00 UTC) Mon–Fri
    - cron: '30,0 14 * * 1-5'
    - cron: '0,30 15,16,17,18,19,20 * * 1-5'
    - cron: '0 21 * * 1-5'

    # ── After-hours: 4:30 PM CST (22:30 UTC) and 7:00 PM CST (01:00 UTC next day)
    - cron: '30 22 * * 1-5'
    - cron: '0 1 * * 2-6'

  workflow_dispatch:  # Manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          GMAIL_USER:    ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:    ${{ secrets.GMAIL_PASS }}
          GMAIL_TO:      ${{ secrets.GMAIL_TO }}
        run: python3 github_scanner.py
